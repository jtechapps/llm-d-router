# Consolidated router configuration for optimized-baseline guide

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    replicas: 1
    image:
      registry: ghcr.io/llm-d
      repository: llm-d-router-endpoint-picker-dev
      tag: main
      pullPolicy: Always
    flags:
      v: 4
      health-checking: true
    pluginsConfigFile: "optimized-baseline-plugins.yaml"
    pluginsCustomConfig:
      optimized-baseline-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: active-request-scorer
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: active-request-scorer
            weight: 4
    resources:
      requests:
        cpu: "4"
        memory: 8Gi
      limits:
        memory: 16Gi

  inferencePool:
    failureMode: "FailOpen"

  modelServers:
    protocol: http
    matchLabels:
      llm-d.ai/guide: "optimized-baseline"

  proxy:
    args:
      - "--service-node"
      - "envoy-sidecar"
      - "--log-level"
      - "warn"
      - "--concurrency"
      - "32"
      - "--drain-strategy"
      - "immediate"
      - "--drain-time-s"
      - "60"
      - "-c"
      - "/etc/envoy/envoy.yaml"
    resources:
      requests:
        cpu: "4"
        memory: 8Gi
      limits:
        memory: 16Gi

  tracing:
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"
